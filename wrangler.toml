# Cloudflare Pages project configuration
# Enables Pages Functions (e.g. service binding proxy to auth-api worker)
name = "glidecomp"
pages_build_output_dir = "web/frontend/dist"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

# Service binding to the auth-api worker — available in Pages Functions as env.AUTH_API
[[services]]
binding = "AUTH_API"
service = "auth-api"

[[services]]
binding = "COMPETITION_API"
service = "competition-api"

# Preview environment (every non-master branch deploy): the bindings point at a
# 503-only blackhole worker, NOT the production workers. Branch previews reach
# their own per-branch workers by URL via the generated
# functions/lib/preview-backends.ts (Pages preview bindings are one fixed set
# for ALL branches, so they can't route per-branch); the blackhole guarantees
# that any code path still using a binding on a preview fails loudly instead of
# silently reading or writing production data.
[[env.preview.services]]
binding = "AUTH_API"
service = "preview-blackhole"

[[env.preview.services]]
binding = "COMPETITION_API"
service = "preview-blackhole"
