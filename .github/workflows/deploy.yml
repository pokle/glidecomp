name: Deploy

# One workflow for every branch. Test + E2E + build + Pages preview deploy +
# smoke tests run identically on every push; the master-only production steps
# (real Worker deploys, apex D1 migrations, the apex-routed scores check) are
# gated on `github.ref_name == 'master'`. Keeping a single definition means the
# branch-preview and production paths can never drift — the drift that let the
# git-sha smoke check silently rot on master while it was green on branches.
on:
  push:
    branches:
      - '**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck:all

      - name: Run tests
        run: bun run test:all

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Create auth .dev.vars
        run: |
          cat > web/workers/auth-api/.dev.vars << 'EOF'
          GOOGLE_CLIENT_ID=dummy-for-ci
          GOOGLE_CLIENT_SECRET=dummy-for-ci
          BETTER_AUTH_SECRET=ci-test-secret
          BETTER_AUTH_URL=http://localhost:3000
          EOF

      # Probe wrangler & d1 migrations directly (no `bun run --filter`)
      # so any crash surfaces real stderr instead of being swallowed by
      # bun's prefixed-output buffer.
      - name: Probe auth-api startup
        run: |
          cd web/workers/auth-api
          bunx wrangler --version
          CI=true bunx wrangler d1 migrations apply taskscore-auth --local --persist-to ../../.wrangler/state

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Dump wrangler logs on failure
        if: failure()
        run: |
          echo "=== ~/.config/.wrangler/logs ==="
          ls -la ~/.config/.wrangler/logs/ 2>/dev/null || echo "(no logs dir)"
          for f in ~/.config/.wrangler/logs/*.log; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            cat "$f"
          done

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          # test-results/ holds the per-failure trace.zip files referenced by
          # playwright.config.ts's `trace: "retain-on-failure"`. They're
          # separate from the HTML report, so include both paths.
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate required secrets
        run: |
          if [ -z "$VITE_MAPBOX_TOKEN" ]; then
            echo "Error: VITE_MAPBOX_TOKEN is not set"
            exit 1
          fi
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Build
        run: bun run build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      # ── Production-only: deploy the Workers before Pages (Pages service
      # bindings require the Workers to exist). Branch previews reuse the
      # already-deployed production Workers via their service bindings. ──
      - name: Deploy AirScore API Worker
        if: github.ref_name == 'master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/workers/airscore-api
          command: deploy

      - name: Apply D1 Migrations
        if: github.ref_name == 'master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/workers/auth-api
          command: d1 migrations apply taskscore-auth --remote

      - name: Deploy Auth API Worker
        if: github.ref_name == 'master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/workers/auth-api
          command: deploy

      - name: Deploy Competition API Worker
        if: github.ref_name == 'master'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/workers/competition-api
          command: deploy

      # Pages deploy for every branch. `--branch=master` promotes to production
      # (glidecomp.com); any other branch gets its preview alias.
      - name: Deploy to Cloudflare Pages
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch=${{ github.ref_name }}

      - name: Output preview URL (and comment on the PR)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREVIEW_URL="${{ steps.deploy.outputs.deployment-url }}"

          echo "## Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "URL: ${PREVIEW_URL}" >> $GITHUB_STEP_SUMMARY

          # Post the preview URL as a PR comment (if a PR exists for this branch).
          # On master there is no PR, so this is a no-op.
          PR_NUMBER=$(gh pr view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json number --jq '.number' 2>/dev/null || true)
          if [ -n "$PR_NUMBER" ]; then
            COMMENT_MARKER="<!-- branch-deploy-preview -->"
            COMMENT_BODY="${COMMENT_MARKER}
          **Preview Deployment**
          ${PREVIEW_URL}
          _Commit: ${{ github.sha }}_"

            # Delete previous preview comment if it exists, then post a new one
            EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --jq ".[] | select(.body | startswith(\"${COMMENT_MARKER}\")) | .id" 2>/dev/null | head -1 || true)
            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api -X DELETE "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" 2>/dev/null || true
            fi

            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$COMMENT_BODY"
          fi

      # Single shared smoke suite (web/scripts/smoke-test.sh) runs against this
      # deployment for BOTH branch previews and production, so any change to the
      # smoke logic is validated on the PR's preview before it can reach master.
      # The stale-first scores check targets the apex-routed competition worker
      # (only freshly deployed on master), so it's added only for the master run.
      - name: Smoke test — deployment serves the app correctly
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.deployment-url }}
          EXPECTED_SHA: ${{ github.sha }}
          IS_PROD: ${{ github.ref_name == 'master' }}
        run: |
          args=("$DEPLOY_URL" "$EXPECTED_SHA")
          if [ "$IS_PROD" = "true" ]; then
            args+=(--scores-api https://glidecomp.com)
          fi
          bash web/scripts/smoke-test.sh "${args[@]}"
