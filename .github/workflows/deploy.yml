name: Deploy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck:all

      - name: Run tests
        run: bun run test:all

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Create auth .dev.vars
        run: |
          cat > web/workers/auth-api/.dev.vars << 'EOF'
          GOOGLE_CLIENT_ID=dummy-for-ci
          GOOGLE_CLIENT_SECRET=dummy-for-ci
          BETTER_AUTH_SECRET=ci-test-secret
          BETTER_AUTH_URL=http://localhost:3000
          EOF

      # Probe wrangler & d1 migrations directly (no `bun run --filter`)
      # so any crash surfaces real stderr instead of being swallowed by
      # bun's prefixed-output buffer.
      - name: Probe auth-api startup
        run: |
          cd web/workers/auth-api
          bunx wrangler --version
          CI=true bunx wrangler d1 migrations apply taskscore-auth --local --persist-to ../../.wrangler/state

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Dump wrangler logs on failure
        if: failure()
        run: |
          echo "=== ~/.config/.wrangler/logs ==="
          ls -la ~/.config/.wrangler/logs/ 2>/dev/null || echo "(no logs dir)"
          for f in ~/.config/.wrangler/logs/*.log; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            cat "$f"
          done

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          # test-results/ holds the per-failure trace.zip files referenced by
          # playwright.config.ts's `trace: "retain-on-failure"`. They're
          # separate from the HTML report, so include both paths.
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate required secrets
        run: |
          if [ -z "$VITE_MAPBOX_TOKEN" ]; then
            echo "Error: VITE_MAPBOX_TOKEN is not set"
            exit 1
          fi
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Build
        run: bun run build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      # Deploy workers before Pages — Pages service bindings require workers to exist
      - name: Deploy AirScore API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/workers/airscore-api
          command: deploy

      - name: Apply D1 Migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/workers/auth-api
          command: d1 migrations apply taskscore-auth --remote

      - name: Deploy Auth API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/workers/auth-api
          command: deploy

      - name: Deploy Competition API Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: web/workers/competition-api
          command: deploy

      - name: Deploy to Cloudflare Pages
        id: pages-deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch=${{ github.ref_name }}

      - name: Smoke test — SPA routes serve the app shell at the right version
        run: |
          DEPLOY_URL="${{ steps.pages-deploy.outputs.deployment-url }}"
          EXPECTED_SHA="${{ github.sha }}"
          echo "Checking ${DEPLOY_URL} @ ${EXPECTED_SHA}"
          fail=0

          # SPA routes must serve the app shell directly with HTTP 200 (no
          # redirect). Catches _redirects / Cloudflare clean-URL regressions
          # that send SPA routes elsewhere — e.g. the /app.html -> /app outage
          # where every SPA route 308-redirected to a "Page not found".
          for route in /comp /u/me /scores; do
            code=$(curl -s -o /dev/null -w '%{http_code}' "${DEPLOY_URL}${route}")
            echo "${route} -> ${code}"
            if [ "$code" != "200" ]; then
              echo "::error::${route} returned HTTP ${code} (expected 200 — SPA route not serving the app shell)"
              fail=1
            fi
          done

          # Version check via the build-time <meta name="git-sha"> in the shell.
          DEPLOYED_SHA=$(curl -s "${DEPLOY_URL}/comp" | grep -oP '<meta name="git-sha" content="\K[a-f0-9]+' | head -1)
          echo "Deployed SHA: ${DEPLOYED_SHA:-<not found>}"
          if [ -z "$DEPLOYED_SHA" ]; then
            echo "::error::Could not read git-sha meta from ${DEPLOY_URL}/comp"
            fail=1
          elif [ "$DEPLOYED_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Deployed SHA ${DEPLOYED_SHA} does not match expected ${EXPECTED_SHA}"
            fail=1
          fi

          if [ "$fail" = "0" ]; then echo "Good — SPA routes serve ${EXPECTED_SHA}"; fi
          exit $fail

      - name: Smoke test — verify dev-login is NOT accessible
        run: |
          DEPLOY_URL="${{ steps.pages-deploy.outputs.deployment-url }}"
          echo "Testing against: ${DEPLOY_URL}"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "${DEPLOY_URL}/api/auth/dev-login" \
            -H 'Content-Type: application/json' \
            -d '{"name":"smoke","email":"smoke@test.local"}')
          echo "POST /api/auth/dev-login returned HTTP $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "::error::CRITICAL: dev-login endpoint is accessible at ${DEPLOY_URL}!"
            exit 1
          fi
          echo "Good — dev-login is blocked"

      - name: Smoke test — scores serve stale-first from D1 with ETag/304
        run: |
          # The competition worker is routed on the apex domain (not the
          # pages.dev preview), so hit production directly. The sample comp is
          # always seeded in prod; if the list is ever empty, warn and skip
          # rather than failing the deploy over missing sample data.
          API="https://glidecomp.com"
          COMP_ID=$(curl -s "${API}/api/comp" | jq -r '.comps[0].comp_id // empty')
          if [ -z "$COMP_ID" ]; then
            echo "::warning::No public comps found — skipping score smoke test"
            exit 0
          fi
          echo "Checking comp ${COMP_ID} scores"
          HEADERS=$(mktemp)
          curl -s -o /dev/null -D "$HEADERS" "${API}/api/comp/${COMP_ID}/scores"
          XCACHE=$(grep -i '^x-cache:' "$HEADERS" | tr -d '\r' | awk '{print $2}')
          ETAG=$(grep -i '^etag:' "$HEADERS" | tr -d '\r' | cut -d' ' -f2-)
          echo "X-Cache: ${XCACHE:-<missing>}  ETag: ${ETAG:-<missing>}"
          case "$XCACHE" in
            HIT|HIT-STALE|MISS) ;;
            *) echo "::error::/scores X-Cache header missing or unexpected (${XCACHE:-none})"; exit 1 ;;
          esac
          if [ -z "$ETAG" ]; then
            echo "::error::/scores response has no ETag"; exit 1
          fi
          # A conditional re-request of unchanged scores must transfer nothing.
          CODE=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "If-None-Match: ${ETAG}" "${API}/api/comp/${COMP_ID}/scores")
          echo "Conditional GET -> ${CODE}"
          if [ "$CODE" != "304" ] && [ "$CODE" != "200" ]; then
            echo "::error::Conditional GET returned ${CODE} (expected 304, or 200 if a re-score landed mid-check)"
            exit 1
          fi
          echo "Good — scores are stale-first with working conditional requests"
