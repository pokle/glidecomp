name: Branch Deploy

on:
  push:
    branches:
      - '**'
      - '!master'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type check
        run: bun run typecheck:all

      - name: Run tests
        run: bun run test:all

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Create auth .dev.vars
        run: |
          cat > web/workers/auth-api/.dev.vars << 'EOF'
          GOOGLE_CLIENT_ID=dummy-for-ci
          GOOGLE_CLIENT_SECRET=dummy-for-ci
          BETTER_AUTH_SECRET=ci-test-secret
          BETTER_AUTH_URL=http://localhost:3000
          EOF

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          # test-results/ holds the per-failure trace.zip files referenced by
          # playwright.config.ts's `trace: "retain-on-failure"`. They're
          # separate from the HTML report, so include both paths.
          path: |
            playwright-report/
            test-results/
          retention-days: 7

  deploy:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate required secrets
        run: |
          if [ -z "$VITE_MAPBOX_TOKEN" ]; then
            echo "Error: VITE_MAPBOX_TOKEN is not set"
            exit 1
          fi
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Build
        run: bun run build
        env:
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}

      - name: Deploy to Cloudflare Pages (Branch Preview)
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy --branch=${{ github.ref_name }}

      - name: Output Preview URL
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREVIEW_URL="${{ steps.deploy.outputs.deployment-url }}"

          echo "## Preview Deployment" >> $GITHUB_STEP_SUMMARY
          echo "Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "Preview URL: ${PREVIEW_URL}" >> $GITHUB_STEP_SUMMARY

          # Post preview URL as a PR comment (if a PR exists for this branch)
          PR_NUMBER=$(gh pr view "${{ github.ref_name }}" --repo "${{ github.repository }}" --json number --jq '.number' 2>/dev/null || true)
          if [ -n "$PR_NUMBER" ]; then
            COMMENT_MARKER="<!-- branch-deploy-preview -->"
            COMMENT_BODY="${COMMENT_MARKER}
          **Preview Deployment**
          ${PREVIEW_URL}
          _Commit: ${{ github.sha }}_"

            # Delete previous preview comment if it exists, then post a new one
            EXISTING_COMMENT_ID=$(gh api "repos/${{ github.repository }}/issues/${PR_NUMBER}/comments" --jq ".[] | select(.body | startswith(\"${COMMENT_MARKER}\")) | .id" 2>/dev/null | head -1 || true)
            if [ -n "$EXISTING_COMMENT_ID" ]; then
              gh api -X DELETE "repos/${{ github.repository }}/issues/comments/${EXISTING_COMMENT_ID}" 2>/dev/null || true
            fi

            gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$COMMENT_BODY"
          fi

      - name: Smoke test — SPA routes serve the app shell at the right version
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deployment-url }}"
          EXPECTED_SHA="${{ github.sha }}"
          echo "Checking ${DEPLOY_URL} @ ${EXPECTED_SHA}"
          fail=0

          # SPA routes must serve the app shell directly with HTTP 200 (no
          # redirect). Catches _redirects / Cloudflare clean-URL regressions
          # that send SPA routes elsewhere — e.g. the /app.html -> /app outage
          # where every SPA route 308-redirected to a "Page not found". Running
          # this on the PR preview means such a regression fails the PR, not prod.
          # Retry with backoff: /comp is now served by the SSR Pages Function,
          # which can propagate to the edge a few seconds after the static
          # assets, so a just-finished deploy may transiently 404 it.
          check_route() {
            local route="$1" code=""
            for attempt in $(seq 1 10); do
              code=$(curl -s -o /dev/null -w '%{http_code}' "${DEPLOY_URL}${route}")
              if [ "$code" = "200" ]; then echo "${route} -> ${code}"; return 0; fi
              echo "${route} -> ${code} (attempt ${attempt}/10, retrying in 3s…)"
              sleep 3
            done
            echo "::error::${route} returned HTTP ${code} after retries (expected 200 — route not serving the app shell)"
            return 1
          }
          for route in /comp /u/me /scores; do check_route "$route" || fail=1; done

          # Version check via the build-time <meta name="git-sha"> in the shell.
          DEPLOYED_SHA=$(curl -s "${DEPLOY_URL}/comp" | grep -oP '<meta name="git-sha" content="\K[a-f0-9]+' | head -1)
          echo "Deployed SHA: ${DEPLOYED_SHA:-<not found>}"
          if [ -z "$DEPLOYED_SHA" ]; then
            echo "::error::Could not read git-sha meta from ${DEPLOY_URL}/comp"
            fail=1
          elif [ "$DEPLOYED_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::Deployed SHA ${DEPLOYED_SHA} does not match expected ${EXPECTED_SHA}"
            fail=1
          fi

          if [ "$fail" = "0" ]; then echo "Good — SPA routes serve ${EXPECTED_SHA}"; fi
          exit $fail

      - name: Smoke test — verify dev-login is NOT accessible
        run: |
          DEPLOY_URL="${{ steps.deploy.outputs.deployment-url }}"
          echo "Testing against: ${DEPLOY_URL}"
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -X POST "${DEPLOY_URL}/api/auth/dev-login" \
            -H 'Content-Type: application/json' \
            -d '{"name":"smoke","email":"smoke@test.local"}')
          echo "POST /api/auth/dev-login returned HTTP $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]; then
            echo "::error::CRITICAL: dev-login endpoint is accessible at ${DEPLOY_URL}!"
            exit 1
          fi
          echo "Good — dev-login is blocked"
