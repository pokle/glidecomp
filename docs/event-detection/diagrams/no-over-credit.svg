<text x="24" y="30" font-size="16" font-weight="600" fill="#1f2328">No over-credit — a goal cylinder visited BEFORE the turnpoint stays uncounted</text>
<text x="24" y="50" fill="#57606a">The pilot clips the goal cylinder on the way out (enter t₁, exit t₂), then tags TP1 from outside</text>
<text x="24" y="67" fill="#57606a">it and lands without returning. The last crossing before t₃ is an EXIT → outside → no credit.</text>
