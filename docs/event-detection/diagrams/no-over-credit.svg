<rect x="24.0" y="340.8" width="885.3" height="78" rx="6" fill="#1a7f37" fill-opacity="0.08" stroke="#1a7f37"/>
<text x="36.0" y="362.8" font-weight="600" fill="#1a7f37">Before AND after the fix ✓</text>
<text x="36.0" y="382.8" fill="#1f2328">Presence is checked AT the previous reaching (t₃): the last goal crossing before t₃ is the exit at t₂,</text>
<text x="36.0" y="399.8" fill="#1f2328">so the pilot is outside — and no crossing follows t₃. Correctly scored landed out; earlier visits never count.</text>
