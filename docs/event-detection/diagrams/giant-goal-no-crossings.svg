<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 607" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13">
<rect width="960" height="607" rx="8" fill="#f8fafc" stroke="#d0d7de"/>
<text x="24" y="30" font-size="16" font-weight="600" fill="#1f2328">Edge case — a goal cylinder the flight never crosses at all</text>
<text x="24" y="50" fill="#57606a">A 20 km ESS/goal cylinder contains launch, TP1 and the entire track: zero boundary</text>
<text x="24" y="67" fill="#57606a">crossings. Presence falls back to “where did the track begin?” — inside.</text>
<g transform="translate(902, 30)" stroke="#57606a" fill="#57606a"><line x1="0" y1="0" x2="26" y2="0" stroke-width="1.5"/><path d="M 26 0 l -7 -4 l 0 8 z" stroke="none"/><text x="32" y="4" stroke="none" font-size="12">N</text></g>
<circle cx="480.0" cy="295.9" r="181.8" fill="#d4761a" fill-opacity="0.10" stroke="#d4761a" stroke-width="2"/>
<circle cx="480.0" cy="295.9" r="2.5" fill="#d4761a"/>
<text x="480.0" y="106.1" text-anchor="middle" font-weight="600" fill="#d4761a">ESS / GOAL (20 km) — never crossed</text>
<circle cx="429.4" cy="295.9" r="9.1" fill="#8b949e" fill-opacity="0.10" stroke="#8b949e" stroke-width="2" stroke-dasharray="6 5"/>
<circle cx="429.4" cy="295.9" r="2.5" fill="#8b949e"/>
<text x="429.4" y="321.9" text-anchor="middle" font-weight="600" fill="#8b949e">START</text>
<circle cx="530.6" cy="295.9" r="3.6" fill="#316dca" fill-opacity="0.10" stroke="#316dca" stroke-width="2"/>
<circle cx="530.6" cy="295.9" r="2.5" fill="#316dca"/>
<text x="530.6" y="329.9" text-anchor="middle" font-weight="600" fill="#316dca">TP1</text>
<path d="M 429.4 295.9 L 449.6 295.9 L 480.0 295.9 L 520.5 295.9 L 530.6 295.9" fill="none" stroke="#1f2328" stroke-width="2.25" stroke-linejoin="round"/>
<circle cx="429.4" cy="295.9" r="3" fill="#57606a"/>
<circle cx="449.6" cy="295.9" r="3" fill="#57606a"/>
<circle cx="480.0" cy="295.9" r="3" fill="#57606a"/>
<circle cx="520.5" cy="295.9" r="3" fill="#57606a"/>
<circle cx="530.6" cy="295.9" r="3" fill="#57606a"/>
<text x="437.4" y="343.9" text-anchor="middle" fill="#57606a">launch (already inside goal)</text>
<g transform="translate(530.6, 295.9)"><circle r="6.5" fill="none" stroke="#1f2328" stroke-width="2"/><circle r="2" fill="#1f2328"/></g>
<g transform="translate(527.0, 295.9)"><circle r="7" fill="none" stroke="#1a7f37" stroke-width="2.5"/><circle r="2" fill="#1a7f37"/></g>
<text x="539.0" y="275.9" text-anchor="start" font-weight="600" fill="#1a7f37">t₂ tags TP1 → goal credited at t₂</text>
<rect x="24.0" y="498.8" width="444.0" height="78" rx="6" fill="#cf222e" fill-opacity="0.08" stroke="#cf222e"/>
<text x="36.0" y="520.8" font-weight="600" fill="#cf222e">Before the fix ✗</text>
<text x="36.0" y="540.8" fill="#1f2328">No crossing of the goal cylinder exists anywhere,</text>
<text x="36.0" y="557.8" fill="#1f2328">so the pilot could never make goal.</text>
<rect x="492.0" y="498.8" width="444.0" height="78" rx="6" fill="#1a7f37" fill-opacity="0.08" stroke="#1a7f37"/>
<text x="504.0" y="520.8" font-weight="600" fill="#1a7f37">After the fix ✓</text>
<text x="504.0" y="540.8" fill="#1f2328">No crossings ever ⇒ inside/outside state never changed</text>
<text x="504.0" y="557.8" fill="#1f2328">⇒ use the state at the first fix: inside → made goal.</text>
</svg>