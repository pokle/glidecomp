<circle cx="368.6" cy="259.4" r="3" fill="#57606a"/>
<circle cx="501.1" cy="259.4" r="3" fill="#57606a"/>
<circle cx="580.6" cy="259.4" r="3" fill="#57606a"/>
<circle cx="633.6" cy="259.4" r="3" fill="#57606a"/>
<circle cx="670.7" cy="259.4" r="3" fill="#57606a"/>
<circle cx="686.6" cy="259.4" r="3" fill="#57606a"/>
<g transform="translate(686.6, 259.4)"><circle r="6.5" fill="none" stroke="#1f2328" stroke-width="2"/><circle r="2" fill="#1f2328"/></g>
<g transform="translate(151.1, 259.4)"><circle r="7" fill="none" stroke="#57606a" stroke-width="2.5"/><circle r="2" fill="#57606a"/></g>
<text x="151.1" y="287.4" text-anchor="middle" font-weight="600" fill="#57606a">start</text>
<g transform="translate(543.8, 259.4)"><circle r="7" fill="none" stroke="#d4761a" stroke-width="2.5"/><circle r="2" fill="#d4761a"/></g>
<text x="529.8" y="225.4" text-anchor="end" font-weight="600" fill="#d4761a">t₁ — enters goal cylinder</text>
<text x="529.8" y="241.4" text-anchor="end" font-weight="600" fill="#d4761a">(the only crossing)</text>
<g transform="translate(614.6, 259.4)"><circle r="7" fill="none" stroke="#316dca" stroke-width="2.5"/><circle r="2" fill="#316dca"/></g>
<text x="614.6" y="299.4" text-anchor="middle" font-weight="600" fill="#316dca">t₂ — tags TP1 (400 m),</text>
<text x="614.6" y="315.4" text-anchor="middle" font-weight="600" fill="#316dca">already inside goal</text>
<rect x="24.0" y="442.9" width="430.6" height="78" rx="6" fill="#cf222e" fill-opacity="0.08" stroke="#cf222e"/>
<text x="36.0" y="464.9" font-weight="600" fill="#cf222e">Before the fix ✗</text>
<text x="36.0" y="484.9" fill="#1f2328">ESS/goal needs a crossing at t ≥ t₂, but its only</text>
<text x="36.0" y="501.9" fill="#1f2328">crossing is t₁ &lt; t₂ → finisher scored LANDED OUT.</text>
<rect x="478.6" y="442.9" width="430.6" height="78" rx="6" fill="#1a7f37" fill-opacity="0.08" stroke="#1a7f37"/>
<text x="490.6" y="464.9" font-weight="600" fill="#1a7f37">After the fix ✓</text>
<text x="490.6" y="484.9" fill="#1f2328">Pilot is already inside the goal cylinder at t₂,</text>
<text x="490.6" y="501.9" fill="#1f2328">so ESS/goal is credited at t₂ → made goal.</text>
