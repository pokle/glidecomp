name = "auth-api"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "glidecomp_auth"
database_name = "taskscore-auth"
database_id = "aa8b644f-368e-493a-8b49-1af0d756aff4"
migrations_dir = "../../db/migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "glidecomp"

# Cloudflare Email Service (Email Sending) — delivers the sign-in OTP emails.
# Requires glidecomp.com to be verified as a sender domain in the dashboard
# (Email Service → sender domains); sends fail with E_SENDER_NOT_VERIFIED
# until then. Local dev never sends (auth.ts short-circuits via isLocalDev).
[[send_email]]
name = "EMAIL"

[vars]
BETTER_AUTH_URL = "https://glidecomp.com"

# Secrets (set via `wrangler secret put` or .dev.vars):
# GOOGLE_CLIENT_ID
# GOOGLE_CLIENT_SECRET
# BETTER_AUTH_SECRET

[dev]
port = 8788
inspector_port = 9230

[[routes]]
pattern = "glidecomp.com/api/auth/*"
zone_name = "glidecomp.com"
