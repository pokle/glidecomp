name = "competition-api"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "taskscore-auth"
database_id = "aa8b644f-368e-493a-8b49-1af0d756aff4"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "glidecomp"

[[services]]
binding = "AUTH_API"
service = "auth-api"

[vars]
# This is the default SQIDS_ALPHABET if not set elsewhere
# in cloudflare console, or in web/workers/competition-api/.dev.vars
SQIDS_ALPHABET = "abcdefghijklmnopqrstuvwxyz"

# Secrets (set via `wrangler secret put` or .dev.vars):
# (none yet — auth is via service binding)

[dev]
port = 8789

[[kv_namespaces]]
binding = "glidecomp_scores_cache"
id = "dcf6eb84eca04b46880c3b48c51bdd3c"
preview_id = "fc7d966cba2c40fdb52c83c7a88c217e"
# Run to create: bun run wrangler2 kv namespace create glidecomp_scores_cache
#                bun run wrangler2 kv namespace create glidecomp_scores_cache --preview

[[routes]]
pattern = "glidecomp.com/api/comp/*"
zone_name = "glidecomp.com"
