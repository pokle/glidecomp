name = "competition-api"
main = "src/index.ts"
compatibility_date = "2025-03-10"
compatibility_flags = ["nodejs_compat"]

# Run this worker near its storage (D1 primary / R2 bucket) instead of near
# the client. Requests here make many sequential D1/R2/KV round trips (4 D1
# queries even on a cache hit; up to ~35 R2 GETs on a cold 3dvis build), so
# trading one long client hop for short storage hops wins for far-away users.
# See docs/performance-investigation-2026-07.md. Smart Placement learns from
# live traffic, so expect it to take effect some time after deploy.
[placement]
mode = "smart"

# The worker's heaviest path is field-analysis revalidation: it holds a whole
# task's decompressed tracklogs in memory and runs the thermal/glide/circle
# detectors plus a cross-pilot time grid over them (~0.4 s for 32 pilots,
# extrapolating to a couple of seconds for a large field). That runs inside
# waitUntil, sharing the invocation's CPU budget. The paid-plan default is
# already 30 s, but state it explicitly so the ceiling is a reviewed decision
# rather than an inherited one. See MAX_FIELD_ANALYSIS_TRACKS in scoring.ts —
# memory, not CPU, is the real limit.
[limits]
cpu_ms = 60000

[[d1_databases]]
binding = "DB"
database_name = "taskscore-auth"
database_id = "aa8b644f-368e-493a-8b49-1af0d756aff4"
migrations_dir = "../../db/migrations"

[[r2_buckets]]
binding = "R2"
bucket_name = "glidecomp"

[[services]]
binding = "AUTH_API"
service = "auth-api"

[[services]]
binding = "AIRSCORE_API"
service = "airscore-api"

[vars]
# This is the default SQIDS_ALPHABET if not set elsewhere
# in cloudflare console, or in web/workers/competition-api/.dev.vars
SQIDS_ALPHABET = "abcdefghijklmnopqrstuvwxyz"

# Secrets (set via `wrangler secret put` or .dev.vars):
# (none yet — auth is via service binding)

[dev]
port = 8789
inspector_port = 9231

[[kv_namespaces]]
binding = "glidecomp_scores_cache"
id = "dcf6eb84eca04b46880c3b48c51bdd3c"
preview_id = "fc7d966cba2c40fdb52c83c7a88c217e"
# Run to create: bunx wrangler kv namespace create glidecomp_scores_cache
#                bunx wrangler kv namespace create glidecomp_scores_cache --preview

[[routes]]
pattern = "glidecomp.com/api/comp"
zone_name = "glidecomp.com"

[[routes]]
pattern = "glidecomp.com/api/comp/*"
zone_name = "glidecomp.com"

[[routes]]
pattern = "glidecomp.com/api/user"
zone_name = "glidecomp.com"

[[routes]]
pattern = "glidecomp.com/api/user/*"
zone_name = "glidecomp.com"

[[routes]]
pattern = "glidecomp.com/api/u/*"
zone_name = "glidecomp.com"
