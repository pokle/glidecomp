<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlideComp</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* Base UI quick-start requirements (not visual styling):
       - the app root needs its own stacking context so popups layer above
         page content (https://base-ui.com/react/overview/quick-start)
       - body { position: relative } is required for iOS 26+ Safari */
    #root { isolation: isolate; }
    body { position: relative; }

    /* Functional-only modal rules, not visual design: Base UI's modal inert
       overlay is position:fixed, so an unpositioned (static) Dialog.Popup
       paints underneath it and every click is intercepted. Fixed-positioning
       the popup (a later sibling of the overlay) puts it above; the system
       Canvas background keeps its text legible over the page. */
    [role="dialog"], [role="alertdialog"] {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-height: 90vh;
      max-width: 90vw;
      overflow: auto;
      background: Canvas;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/react/main.tsx"></script>
</body>

</html>
