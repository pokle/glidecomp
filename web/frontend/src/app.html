<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlideComp</title>

  <!-- Default SEO/social tags. The SSR Function overrides title/description
       and adds JSON-LD per public route; these are the fallback for
       client-rendered SPA routes and link previews. No canonical link anywhere:
       iOS Safari's share sheet copies it instead of the address bar, and it
       goes stale after client-side (pushState) navigation. -->
  <meta name="description"
    content="GlideComp analyses hang gliding and paragliding competition tracks: tasks, GAP scoring, and per-pilot score explanations.">
  <meta property="og:site_name" content="GlideComp">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary">

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- All styling (including the Base UI quick-start rules) lives in
       src/react/globals.css, imported by the app entry. -->

  <!-- Apply the Light/Dark/Auto preference before paint to avoid a flash.
       Mirrors src/react/lib/theme.ts (localStorage `glidecomp-theme`). -->
  <script>
    (function () {
      var pref = localStorage.getItem("glidecomp-theme");
      if (pref !== "light" && pref !== "dark" && pref !== "auto") pref = "auto";
      var dark = pref === "dark" ||
        (pref === "auto" && window.matchMedia("(prefers-color-scheme: dark)").matches);
      document.documentElement.classList.toggle("dark", dark);
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/react/entry-client.tsx"></script>
</body>

</html>
