<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlideComp - Admin: Cache</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="min-h-screen bg-background text-foreground">
  <div id="admin-cache-page" class="hidden min-h-screen flex flex-col">

    <div id="app-nav"></div>

    <main class="flex-1 max-w-3xl mx-auto w-full px-4 sm:px-6 py-8">
      <div id="admin-cache-loading" class="py-8 animate-pulse space-y-4" role="status" aria-label="Loading cache stats">
        <div class="h-8 w-48 rounded-md bg-muted"></div>
        <div class="h-32 rounded-lg bg-muted"></div>
        <span class="sr-only">Loading cache stats…</span>
      </div>

      <div id="admin-cache-error" class="hidden text-center py-12">
        <p class="text-sm text-muted-foreground" id="admin-cache-error-text">Forbidden.</p>
      </div>

      <div id="admin-cache-content" class="hidden">
        <div class="mb-6 flex items-start justify-between gap-4">
          <div>
            <h1 class="text-2xl font-bold tracking-tight">Cache</h1>
            <p class="text-sm text-muted-foreground mt-1">KV caches backing scoring and the AirScore proxy</p>
          </div>
          <button id="admin-cache-clear-btn" class="btn btn-destructive btn-sm shrink-0">
            Clear entire cache
          </button>
        </div>

        <div class="mb-6 p-4 rounded-lg border border-border bg-card">
          <p class="text-sm text-muted-foreground">Total items</p>
          <p class="text-3xl font-bold tracking-tight" id="admin-cache-total"></p>
        </div>

        <div id="admin-cache-namespaces" class="space-y-4"></div>

        <p id="admin-cache-status" class="mt-6 text-sm text-muted-foreground" role="status" aria-live="polite"></p>
      </div>
    </main>

    <div id="app-footer"></div>
  </div>

  <script type="module" src="/admin-cache.ts"></script>
</body>

</html>
