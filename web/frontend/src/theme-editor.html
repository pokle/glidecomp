<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlideComp - Theme Editor</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">

<body class="min-h-screen bg-background text-foreground">
  <div class="min-h-screen flex flex-col">

    <div id="app-nav"></div>

      <p class="text-sm text-muted-foreground mb-6">Design your own GlideComp theme. Pick colors, fonts, and shapes — see the preview update live.</p>

      <div id="theme-editor-root"></div>
    </main>

  </div>

  <script type="module" src="/theme-editor.ts"></script>

</html>
