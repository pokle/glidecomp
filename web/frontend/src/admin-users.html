<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlideComp - Admin: Users</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0f172a">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Styles -->
  <link rel="stylesheet" href="/styles.css">
</head>

<body class="min-h-screen bg-background text-foreground">
  <div id="admin-users-page" class="hidden min-h-screen flex flex-col">

    <div id="app-nav"></div>

    <main class="flex-1 max-w-5xl mx-auto w-full px-4 sm:px-6 py-8">
      <div id="admin-users-loading" class="py-8 animate-pulse space-y-4" role="status" aria-label="Loading users">
        <div class="h-8 w-48 rounded-md bg-muted"></div>
        <div class="h-64 rounded-lg bg-muted"></div>
        <span class="sr-only">Loading users…</span>
      </div>

      <div id="admin-users-error" class="hidden text-center py-12">
        <p class="text-sm text-muted-foreground" id="admin-users-error-text">Forbidden.</p>
      </div>

      <div id="admin-users-content" class="hidden">
        <div class="mb-6">
          <h1 class="text-2xl font-bold tracking-tight">All Users</h1>
          <p class="text-sm text-muted-foreground mt-1" id="admin-users-count"></p>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="border-b border-border">
                <th class="text-left font-medium text-muted-foreground pb-2 pr-4">User</th>
                <th class="text-left font-medium text-muted-foreground pb-2 pr-4">Email</th>
                <th class="text-left font-medium text-muted-foreground pb-2 pr-4">Joined</th>
                <th class="text-right font-medium text-muted-foreground pb-2 pr-4">Tracks</th>
                <th class="text-right font-medium text-muted-foreground pb-2 pr-4">Tasks</th>
                <th class="text-right font-medium text-muted-foreground pb-2 pr-4">Admin of</th>
                <th class="text-right font-medium text-muted-foreground pb-2">Pilot in</th>
              </tr>
            </thead>
            <tbody id="admin-users-tbody"></tbody>
          </table>
        </div>
      </div>
    </main>

    <div id="app-footer"></div>
  </div>

  <script type="module" src="/admin-users.ts"></script>
</body>

</html>
