<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>GlideComp — 3D Flight Replay (Corryong Cup 2026, Task 1)</title>
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <meta name="theme-color" content="#0a0f1a">
  <link rel="stylesheet" href="/styles.css">
  <style>
    html, body { height: 100%; margin: 0; overflow: hidden; background: #0a0f1a; }
    /* range inputs that read well over the dark canvas */
    input[type="range"] { -webkit-appearance: none; appearance: none; background: transparent; cursor: pointer; }
    input[type="range"]::-webkit-slider-runnable-track { height: 4px; border-radius: 9999px; background: #334155; }
    input[type="range"]::-moz-range-track { height: 4px; border-radius: 9999px; background: #334155; }
    input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; margin-top: -6px; width: 16px; height: 16px; border-radius: 9999px; background: #bcc817; box-shadow: 0 0 0 2px #0a0f1a; }
    input[type="range"]::-moz-range-thumb { width: 16px; height: 16px; border: none; border-radius: 9999px; background: #bcc817; box-shadow: 0 0 0 2px #0a0f1a; }
    #scrubber::-webkit-slider-runnable-track { height: 6px; }
    #scrubber::-webkit-slider-thumb { margin-top: -5px; }
    .panel { background: rgba(15, 23, 42, 0.82); backdrop-filter: blur(8px); border: 1px solid rgba(148, 163, 184, 0.18); }

    /* The timeline scrubber is the primary touch target on phones — give it a
       much taller hit area and a bigger thumb so fingers don't miss it. The
       input's height defines the vertical tap tolerance; the track stays
       centred within it. */
    @media (max-width: 767px) {
      #scrubber { height: 2.75rem; }
      #scrubber::-webkit-slider-runnable-track { height: 8px; }
      #scrubber::-webkit-slider-thumb { width: 28px; height: 28px; margin-top: -10px; }
      #scrubber::-moz-range-track { height: 8px; }
      #scrubber::-moz-range-thumb { width: 28px; height: 28px; }
    }
  </style>
  <script type="module" src="/samples/3dvis.ts"></script>
</head>

<body class="text-slate-100 font-sans antialiased">
  <div id="app" class="fixed inset-0">
    <!-- 3D canvas / map mounts here. h-full w-full (not just inset-0) because
         Mapbox adds .mapboxgl-map { position: relative }, which would otherwise
         override `absolute` and collapse the inset-0 height to 0. -->
    <div id="viewer" class="absolute inset-0 h-full w-full"></div>

    <!-- hover tooltip -->
    <div id="tooltip"
      class="pointer-events-none absolute z-30 hidden rounded-md panel px-2.5 py-1.5 text-xs shadow-lg">
    </div>

    <!-- top-left: title + stats -->
    <div class="absolute left-3 top-3 z-20 max-w-[14rem] sm:max-w-xs rounded-lg panel px-3 py-2 sm:px-4 sm:py-3 shadow-xl">
      <a href="/" class="text-[11px] text-slate-400 hover:text-slate-200 transition-colors">← GlideComp</a>
      <h1 class="mt-0.5 text-sm sm:text-base font-semibold leading-tight">3D Flight Replay</h1>
      <p id="subtitle" class="text-[11px] sm:text-xs text-slate-400">Corryong Cup 2026 · Task 1</p>
      <p id="stats" class="mt-1 text-[11px] text-slate-500 hidden sm:block">Loading tracks…</p>
    </div>

    <!-- hamburger menu toggle: opens the single scrolling control panel -->
    <button id="menuToggle" type="button" aria-haspopup="true" aria-expanded="false" aria-controls="menuPanel"
      class="absolute right-3 top-3 z-30 grid h-11 w-11 place-items-center rounded-full panel shadow-xl text-xl leading-none text-slate-200 hover:text-white hover:bg-slate-700/50 transition-colors"
      title="Menu">☰</button>

    <!-- single scrolling control panel: View / Pilots / Gaggles, all in one
         place — replaces what used to be three separate floating panels plus
         a mobile-only tab strip. -->
    <div id="menuPanel"
      class="absolute right-0 top-0 z-30 flex h-full w-80 max-w-[90vw] translate-x-full flex-col panel shadow-2xl border-l border-slate-700/60 transition-transform duration-300 ease-out">
      <div class="flex items-center justify-between px-4 py-3 border-b border-slate-700/60 shrink-0">
        <span class="text-sm font-semibold">Menu</span>
        <button id="menuClose" type="button" class="text-slate-400 hover:text-slate-200 text-xl leading-none" aria-label="Close menu" title="Close">×</button>
      </div>

      <div class="flex-1 min-h-0 overflow-y-auto px-4 py-3 space-y-5">

        <!-- View -->
        <section>
          <h2 class="text-[11px] uppercase tracking-wide text-slate-400 mb-2">View</h2>
          <div class="space-y-3">
            <div>
              <label class="block text-[11px] uppercase tracking-wide text-slate-400 mb-1">Backdrop</label>
              <div class="grid grid-cols-2 gap-1">
                <button id="bdAbstract"
                  class="bd-btn rounded-md border border-slate-600 px-2 py-1 text-xs transition-colors bg-lime-500 text-slate-900">Abstract</button>
                <button id="bdTerrain"
                  class="bd-btn rounded-md border border-slate-600 px-2 py-1 text-xs transition-colors bg-slate-800 text-slate-300 hover:bg-slate-700">Map</button>
              </div>
            </div>
            <div id="mapStyleRow" class="hidden">
              <label class="block text-[11px] uppercase tracking-wide text-slate-400 mb-1">Map style</label>
              <select id="mapStyle"
                class="w-full rounded-md bg-slate-800 border border-slate-600 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-lime-400"></select>
            </div>
            <div>
              <label class="block text-[11px] uppercase tracking-wide text-slate-400 mb-1">Colour by</label>
              <select id="colorMode"
                class="w-full rounded-md bg-slate-800 border border-slate-600 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-lime-400">
                <option value="pilot">Pilot</option>
                <option value="altitude">Altitude</option>
                <option value="vario">Vertical speed</option>
              </select>
              <!-- colour scale legend (shown for altitude / vertical speed) -->
              <div id="colorLegend" class="hidden mt-1.5">
                <div id="legendBar" class="h-1.5 rounded-sm"></div>
                <div class="flex justify-between text-[10px] text-slate-400 mt-0.5 leading-none">
                  <span id="legendLo"></span><span id="legendMid" class="text-slate-500"></span><span id="legendHi"></span>
                </div>
              </div>
            </div>
            <div>
              <label class="flex justify-between text-[11px] uppercase tracking-wide text-slate-400 mb-1">
                <span>Vertical ×</span><span id="vscaleVal" class="text-slate-300 normal-case">3.0×</span>
              </label>
              <input id="vscale" type="range" min="1" max="6" step="0.5" value="3" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-[11px] uppercase tracking-wide text-slate-400 mb-1">
                <span>Trail</span><span id="tailVal" class="text-slate-300 normal-case">10 min</span>
              </label>
              <input id="tail" type="range" min="1" max="31" step="1" value="10" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-[11px] uppercase tracking-wide text-slate-400 mb-1">
                <span>Width</span><span id="widthVal" class="text-slate-300 normal-case">3 px</span>
              </label>
              <input id="width" type="range" min="1" max="10" step="1" value="3" class="w-full">
            </div>
            <div class="flex gap-2 pt-0.5">
              <button id="resetView"
                class="flex-1 rounded-md bg-slate-800 hover:bg-slate-700 border border-slate-600 px-2 py-1 text-xs transition-colors"
                title="Frame the whole task">Reset</button>
              <button id="topView"
                class="flex-1 rounded-md bg-slate-800 hover:bg-slate-700 border border-slate-600 px-2 py-1 text-xs transition-colors"
                title="Look straight down (north up)">Top</button>
              <button id="sideView"
                class="flex-1 rounded-md bg-slate-800 hover:bg-slate-700 border border-slate-600 px-2 py-1 text-xs transition-colors"
                title="Side / profile view">Side</button>
              <button id="fullscreen"
                class="rounded-md bg-slate-800 hover:bg-slate-700 border border-slate-600 px-2 py-1 text-xs transition-colors"
                title="Toggle fullscreen">⛶</button>
            </div>
          </div>
        </section>

        <!-- Pilots -->
        <section class="pt-4 border-t border-slate-700/60">
          <div class="flex items-center gap-2 mb-2">
            <h2 class="text-[11px] uppercase tracking-wide text-slate-400 flex-1">Pilots</h2>
            <button id="toggleAll" class="text-[11px] text-slate-400 hover:text-slate-200">hide all</button>
          </div>
          <input id="pilotSearch" type="search" placeholder="Search pilots…" autocomplete="off"
            class="w-full mb-2 rounded-md bg-slate-800 border border-slate-600 px-2 py-1 text-xs placeholder:text-slate-500 focus:outline-none focus:ring-1 focus:ring-lime-400">
          <ul id="legend" class="max-h-72 overflow-y-auto text-xs rounded-md border border-slate-700/60 divide-y divide-slate-800/60"></ul>
          <div id="followBar" class="hidden mt-2 px-3 py-2 rounded-md bg-slate-800/60 text-[11px]">
            Following <span id="followName" class="text-slate-200 font-medium"></span>
            <button id="unfollow" class="ml-1 text-lime-400 hover:underline">stop</button>
          </div>
        </section>

        <!-- Gaggles -->
        <section class="pt-4 border-t border-slate-700/60">
          <div class="flex items-center gap-2 mb-2">
            <h2 class="text-[11px] uppercase tracking-wide text-slate-400 flex-1">Gaggles</h2>
            <button id="gaggleActiveOnly" class="text-[11px] text-slate-400 hover:text-slate-200" title="Show only gaggles active at the current time">active now</button>
            <button id="gaggleToggle" class="text-[11px] text-lime-400 hover:underline" title="Show/hide the gaggle overlay">hide</button>
          </div>
          <ul id="gaggleList" class="max-h-56 overflow-y-auto text-xs rounded-md border border-slate-700/60 divide-y divide-slate-800/60"></ul>
          <!-- dev-only threshold sliders (unhidden in DEV) -->
          <div id="gaggleDev" class="hidden mt-3 space-y-2">
            <div>
              <label class="flex justify-between text-[10px] uppercase tracking-wide text-slate-400">
                <span>Radius</span><span id="ggRadiusVal" class="text-slate-300 normal-case">400 m</span>
              </label>
              <input id="ggRadius" type="range" min="100" max="1000" step="50" value="400" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-[10px] uppercase tracking-wide text-slate-400">
                <span>Vert band</span><span id="ggBandVal" class="text-slate-300 normal-case">300 m</span>
              </label>
              <input id="ggBand" type="range" min="100" max="800" step="50" value="300" class="w-full">
            </div>
            <div>
              <label class="flex justify-between text-[10px] uppercase tracking-wide text-slate-400">
                <span>Min pilots</span><span id="ggMinVal" class="text-slate-300 normal-case">2</span>
              </label>
              <input id="ggMin" type="range" min="2" max="6" step="1" value="2" class="w-full">
            </div>
          </div>
        </section>

      </div>
    </div>

    <!-- bottom-left: scale bar + compass (desktop only — saves space on phones) -->
    <div class="absolute left-3 bottom-24 z-20 hidden md:flex items-end gap-3">
      <div class="rounded-md panel px-2 py-1.5">
        <div id="scaleBar" class="h-1.5 bg-slate-200 rounded-sm" style="width: 80px;"></div>
        <div id="scaleLabel" class="mt-1 text-[10px] text-slate-300 text-center">—</div>
      </div>
      <button id="compassBtn" class="rounded-full panel w-12 h-12 relative grid place-items-center cursor-pointer hover:bg-slate-700/40 transition-colors" title="Click to face north">
        <svg id="compass" viewBox="0 0 40 40" class="w-9 h-9">
          <g id="compassRot">
            <polygon points="20,5 16,22 24,22" fill="#f87171"></polygon>
            <polygon points="20,35 16,22 24,22" fill="#94a3b8"></polygon>
          </g>
          <text x="20" y="11" text-anchor="middle" font-size="7" fill="#e2e8f0" font-weight="700">N</text>
        </svg>
      </button>
    </div>

    <!-- bottom: timeline (the primary playback transport — always visible, not tucked into the menu) -->
    <div class="absolute inset-x-3 bottom-3 z-20 rounded-lg panel px-4 py-3 shadow-xl">
      <!-- gaggle ribbon, inset to line up with the scrubber track (desktop only) -->
      <div class="mb-2 hidden md:block" style="margin-left: 144px; margin-right: 76px;">
        <div id="gaggleRibbon" class="relative"></div>
      </div>
      <div class="flex items-center gap-3">
        <button id="playPause"
          class="shrink-0 rounded-full bg-lime-500 hover:bg-lime-400 text-slate-900 w-10 h-10 grid place-items-center font-bold transition-colors"
          aria-label="Play/pause">▶</button>
        <div class="shrink-0 w-20 text-center">
          <div id="clock" class="text-sm font-mono tabular-nums leading-none">00:00:00</div>
          <div id="clockZone" class="text-[10px] text-slate-500 leading-none mt-0.5">local</div>
        </div>
        <input id="scrubber" type="range" min="0" max="1000" step="1" value="0" class="flex-1">
        <select id="speed"
          class="shrink-0 rounded-md bg-slate-800 border border-slate-600 px-2 py-1 text-xs focus:outline-none focus:ring-1 focus:ring-lime-400">
          <option value="1">1×</option>
          <option value="4">4×</option>
          <option value="16" selected>16×</option>
          <option value="60">60×</option>
          <option value="240">240×</option>
        </select>
      </div>
    </div>

    <!-- loading / error overlay -->
    <div id="overlay" class="absolute inset-0 z-40 grid place-items-center bg-slate-950/70">
      <div class="text-center">
        <div class="mx-auto mb-3 h-8 w-8 animate-spin rounded-full border-2 border-slate-600 border-t-lime-400"></div>
        <p id="overlayText" class="text-sm text-slate-300">Loading flight tracks…</p>
      </div>
    </div>
  </div>
</body>

</html>
