<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#0f172a"/>
  <!-- Stylised glider silhouette -->
  <g transform="translate(256,240)" fill="none" stroke="white" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <!-- Wings -->
    <line x1="-160" y1="0" x2="160" y2="0"/>
    <!-- Fuselage -->
    <line x1="0" y1="-60" x2="0" y2="80"/>
    <!-- Tail -->
    <line x1="-50" y1="80" x2="50" y2="80"/>
    <!-- Keel -->
    <line x1="-160" y1="0" x2="0" y2="-60"/>
    <line x1="160" y1="0" x2="0" y2="-60"/>
  </g>
  <!-- "TS" text -->
  <text x="256" y="420" font-family="system-ui,sans-serif" font-size="80" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">TaskScore</text>
</svg>
